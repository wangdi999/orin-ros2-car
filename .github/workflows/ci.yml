name: CI - Python Lint

on:
  push:
    branches: [main, member-b]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 smart_car_ws/src/ \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
