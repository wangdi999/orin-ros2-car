name: Build Android APK

on:
  push:
    branches: [main, member-b]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gradle

      - name: Build APK
        run: |
          cd android-remote-app
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-car-remote
          path: android-remote-app/mobile/build/outputs/apk/debug/*.apk
