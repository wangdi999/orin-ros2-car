name: Build Android APK

on:
  push:
    branches: [main, member-b]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          sudo apt-get update -qq
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build APK
        run: |
          cd android-remote-app
          curl -L -o gradle-8.7-bin.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          export GRADLE_HOME=$PWD/gradle-8.7
          export PATH=$GRADLE_HOME/bin:$PATH
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-car-remote
          path: android-remote-app/mobile/build/outputs/apk/debug/*.apk
